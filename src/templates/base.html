<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Mi Aplicación{% endblock %}</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fafafa;
            color: #3b4151;
        }
        header {
            background-color: #1b1b1b;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            color: #ffffff;
            font-size: 1.5rem;
            margin: 0;
            font-weight: 700;
        }
        header a {
            color: #85ea2d;
            text-decoration: none;
            font-weight: bold;
            border: 2px solid #85ea2d;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        header a:hover {
            background-color: #85ea2d;
            color: #1b1b1b;
        }
        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        h2 {
            color: #3b4151;
            font-size: 2rem;
            border-bottom: 2px solid #ebebeb;
            padding-bottom: 0.5rem;
            margin-bottom: 2rem;
        }
        .card {
            background-color: #ffffff;
            border: 1px solid #ebebeb;
            border-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            padding: 2rem;
            margin-bottom: 2rem;
        }
        footer {
            text-align: center;
            padding: 2rem;
            color: #777;
            font-size: 0.9rem;
            border-top: 1px solid #ebebeb;
            margin-top: 4rem;
        }
        
        /* User Grid Styles */
        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            padding: 0;
            margin: 0;
        }
        .user-card {
            background-color: #ffffff;
            border: 1px solid #ebebeb;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
        }
        .user-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.08);
            border-color: #85ea2d;
        }
        .user-badge {
            display: inline-block;
            background-color: #1b1b1b;
            color: #85ea2d;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            letter-spacing: 0.5px;
        }
        .user-info {
            display: flex;
            flex-direction: column;
        }
        .user-info strong {
            font-size: 1.3rem;
            color: #1b1b1b;
            margin-bottom: 0.8rem;
            border-bottom: 2px solid #85ea2d;
            padding-bottom: 0.4rem;
            display: inline-block;
        }
        .user-details {
            color: #555;
            font-size: 0.95rem;
            line-height: 1.8;
        }
        .user-details div {
            display: flex;
            align-items: center;
        }
        .user-details strong {
            font-size: 0.95rem;
            color: #3b4151;
            margin-bottom: 0;
            border: none;
            padding: 0;
            display: inline-block;
            font-weight: 600;
            width: 70px; /* Aligns the labels */
        }
        .empty-state {
            text-align: center;
            color: #777;
            padding: 3rem;
            font-size: 1.1rem;
            background-color: #f9f9f9;
            border-radius: 8px;
            border: 1px dashed #ccc;
        }
    </style>
</head>
<body>
    <header>
        <h1>Sistema de Gestión de Usuarios (Bilbao)</h1>
        <a href="http://127.0.0.1:5000/apidocs">Probar la API con Swagger</a>
    </header>

    <main>
        <h2>{% block header %}Bienvenido{% endblock %}</h2>

        <div class="card">
        {% block content %}
        <!-- Aquí irá el contenido de cada página -->
        {% endblock %}
        </div>
    </main>


</body>
</html>
